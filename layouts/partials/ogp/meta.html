{{- if site.Params.ogp.enabled | default true -}}
  {{- with partial "ogp/image.html" . -}}
    <meta property="og:image" content="{{ .RelPermalink | absURL }}">
    <meta property="og:image:width" content="{{ .Width }}">
    <meta property="og:image:height" content="{{ .Height }}">
    <meta property="og:image:type" content="image/jpeg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ $.Title | plainify }}">
    {{- with $.Description | default $.Summary | plainify }}
      <meta name="twitter:description" content="{{ . }}">
    {{- end }}
    <meta name="twitter:image" content="{{ .RelPermalink | absURL }}">
  {{- end -}}
{{- end -}}
